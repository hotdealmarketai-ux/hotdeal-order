name: invoice-overdue

# 입금 기한 안내 (KST = UTC+9)
#  - 0 1 * * *  → 10:00 KST  매일 1회. 발행 다음날(기본 1일) 미입금 계산서에 안내 푸시.
on:
  # 스케줄 비활성화 — 연체 안내는 cron-job.org → /api/cron/tick 디스패처(10:00 KST)가 담당(2026-07-09).
  # 백업 복구가 필요하면 아래 주석 해제.
  # schedule:
  #   - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "발행 후 며칠 지난 미입금을 대상으로 할지 (기본 1)"
        required: false
        default: "1"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send overdue reminders
        run: |
          curl -fsS \
            "https://hotdeal-order-jet.vercel.app/api/cron/invoice-overdue?days=${{ github.event.inputs.days || '1' }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
