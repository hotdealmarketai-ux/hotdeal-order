# 입금 수집 — 팝빌 계좌조회에서 하나 법인계좌 입금을 주기적으로 끌어와 자동매칭.
# 계좌조회는 계좌당 월정액이라 폴링 횟수는 과금과 무관.
name: bank-collect

on:
  # 스케줄 비활성화 — 입금수집은 cron-job.org → /api/cron/tick 디스패처(10분 주기)가 담당(2026-07-09).
  # 백업 복구가 필요하면 아래 주석 해제.
  # schedule:
  #   - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "며칠치 수집할지 (기본 3)"
        required: false
        default: "3"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect endpoint
        run: |
          DAYS="${{ github.event.inputs.days || '3' }}"
          curl -sS --fail-with-body \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://hotdeal-order-jet.vercel.app/api/cron/collect-deposits?days=${DAYS}" \
            | tee result.json
          # ok=false면 잡 실패로 표시. 단, 키 미설정(skipped)은 연동 전이므로 성공 처리
          python3 -c "import json,sys;d=json.load(open('result.json'));sys.exit(0 if d.get('ok') or d.get('skipped') else 1)"
